<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="src/assets/livre-03.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>L'Emprunthèque</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header class="header">
       <div class="titre-ligne">
        <img src="src/assets/etagere-3.png" class="deco" alt=" icône étagère" />
        <h1>L'Emprunthèque</h1>
       </div>
      <p class="soustitre">
        Les livres les plus empruntés au rayon adulte des bibliothèques parisiennes (2022)
      </p>
    </header>

    <main class="container">
      <div class="search">
        <input type="search" id="recherche" placeholder="Recherche un titre ou un auteur" />
      </div>
       <div id="app" class="liste"></div>
       
      <button class="voir-suite" id="voir-suite">Voir la suite du classement</button>

        <footer class="footer">
          <p>Données : <a href="https://opendata.paris.fr/explore/dataset/les-titres-les-plus-pretes/" target="_blank" rel="noopener">Paris Open Data</a></p>
          <p>Icônes livres : <a href="https://andelrodis.itch.io/books-for-32x32" target="_blank" rel="noopener">Batuhan Karagöl</a>
            · Icône étagère : <a href="https://sparksandpixels.itch.io/indoor-library-assetpack" target="_blank" rel="noopener">Andy (Sparks & Pixels)</a></p>
        </footer>

    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
